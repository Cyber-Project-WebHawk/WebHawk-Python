version: "3.9"

services:

  db:
    image: postgres:15
    container_name: webhawk_db
    environment:
      POSTGRES_DB: webhawk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: webhawk1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  webhawk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webhawk_app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: webhawk
      DB_USER: postgres
      DB_PASSWORD: webhawk1234
      DB_PORT: 5432
      JWT_SECRET: webhawk_super_secret_key
    depends_on:
      db:
        condition: service_healthy

  vulnerable_backend:
    build:
      context: ./vulnerable_backend
      dockerfile: Dockerfile
    container_name: webhawk_vulnerable
    ports:
      - "5001:5001"

  tester:
    profiles: [test]
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      TEST_DB_HOST: db
      TEST_DB_NAME: webhawk_test
      TEST_DB_USER: postgres
      TEST_DB_PASSWORD: webhawk1234
      TEST_DB_PORT: "5432"
      JWT_SECRET: pytest-test-secret-do-not-use-in-production
    depends_on:
      db:
        condition: service_healthy
    command: ["pytest", "tests/", "-v"]

volumes:
  postgres_data:
