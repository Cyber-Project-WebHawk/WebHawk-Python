version: "3.9"

services:

  db:
    image: postgres:15
    container_name: webhawk_db
    environment:
      POSTGRES_DB: webhawk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: webhawk1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  webhawk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webhawk_app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: webhawk
      DB_USER: postgres
      DB_PASSWORD: webhawk1234
      DB_PORT: 5432
      JWT_SECRET: webhawk_super_secret_key
    depends_on:
      - db

  vulnerable_backend:
    build:
      context: ./vulnerable_backend
      dockerfile: Dockerfile
    container_name: webhawk_vulnerable
    ports:
      - "5001:5001"

volumes:
  postgres_data:
